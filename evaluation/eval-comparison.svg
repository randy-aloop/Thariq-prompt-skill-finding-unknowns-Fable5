<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">prompt-push evaluation comparison</title>
  <desc id="desc">Bar chart comparing with-skill and without-skill pass rates for Claude Opus 4.8 max mode and Claude Fable 5 max mode.</desc>
  <rect width="960" height="360" fill="#fbfaf6"/>
  <text x="48" y="44" fill="#171717" font-family="Arial, sans-serif" font-size="24" font-weight="700">prompt-push eval: skill vs no skill</text>
  <text x="48" y="72" fill="#55524c" font-family="Arial, sans-serif" font-size="14">Pass-rate comparison across the same prompt-rewriting benchmark tasks.</text>

  <line x1="120" y1="280" x2="860" y2="280" stroke="#171717" stroke-width="1.5"/>
  <line x1="120" y1="80" x2="120" y2="280" stroke="#171717" stroke-width="1.5"/>
  <line x1="120" y1="180" x2="860" y2="180" stroke="#dedbd3" stroke-width="1"/>
  <line x1="120" y1="80" x2="860" y2="80" stroke="#dedbd3" stroke-width="1"/>
  <text x="82" y="285" fill="#55524c" font-family="Arial, sans-serif" font-size="12">0%</text>
  <text x="76" y="185" fill="#55524c" font-family="Arial, sans-serif" font-size="12">50%</text>
  <text x="70" y="85" fill="#55524c" font-family="Arial, sans-serif" font-size="12">100%</text>

  <rect x="250" y="80" width="72" height="200" rx="3" fill="#2f6f95"/>
  <rect x="338" y="161" width="72" height="119" rx="3" fill="#d36f4f"/>
  <text x="286" y="66" fill="#171717" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">100%</text>
  <text x="374" y="147" fill="#171717" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">59.5%</text>
  <text x="330" y="314" fill="#171717" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Opus 4.8 max</text>
  <text x="330" y="334" fill="#55524c" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+40 point gap</text>

  <rect x="550" y="80" width="72" height="200" rx="3" fill="#2f6f95"/>
  <rect x="638" y="139" width="72" height="141" rx="3" fill="#d36f4f"/>
  <text x="586" y="66" fill="#171717" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">100%</text>
  <text x="674" y="125" fill="#171717" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">70.4%</text>
  <text x="630" y="314" fill="#171717" font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">Fable 5 max</text>
  <text x="630" y="334" fill="#55524c" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+30 point gap</text>

  <rect x="732" y="104" width="16" height="16" fill="#2f6f95"/>
  <text x="758" y="117" fill="#171717" font-family="Arial, sans-serif" font-size="13">With skill</text>
  <rect x="732" y="130" width="16" height="16" fill="#d36f4f"/>
  <text x="758" y="143" fill="#171717" font-family="Arial, sans-serif" font-size="13">Without skill</text>
</svg>
